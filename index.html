<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokerGTO Trainer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f7;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background-color: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .links a:hover {
            background-color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>PokerGTO Trainer</h1>
        <div class="subtitle">德州扑克 GTO 策略练习助手</div>
        <p>欢迎来到 PokerGTO Trainer 支持页面。</p>
        <div class="links">
            <a href="privacy.html">隐私政策</a>
            <a href="support.html">技术支持</a>
        </div>
    </div>
</body>
</html>
